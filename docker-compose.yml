services:
  db:
    image: postgres:16-alpine
    container_name: cogs_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: cogs_db
      POSTGRES_USER: cogs_user
      POSTGRES_PASSWORD: cogs_secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cogs_user -d cogs_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata: